{% extends 'micboard/base.html' %}

{% block content %}
    <h1>All Buildings</h1>
    <ul>
        {% for building in buildings %}
            <li>
                <a href="{% url 'micboard:single_building_view' building_id=building.pk %}">{{ building.name }}</a>
                &middot;
                <a href="{% url 'micboard:rooms_in_building_view' building_id=building.pk %}">Rooms</a>
            </li>
        {% endfor %}
    </ul>
{% endblock %}
