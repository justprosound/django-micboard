{% extends 'micboard/base.html' %}

{% block content %}
    <h1>All Rooms</h1>
    <ul>
        {% for room in rooms %}
            <li><a href="{% url 'micboard:room_view' building=room.building.name room=room.name %}">{{ room.name }}</a> ({{ room.building.name }})</li>
        {% endfor %}
    </ul>
{% endblock %}
