{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ snapshot.wall.name }} - Micboard Kiosk</title>
    <link rel="stylesheet" href="{% static 'micboard/css/accessibility.css' %}">
    <script src="{% static 'micboard/vendor/htmx/htmx-2.0.7.min.js' %}" defer></script>
</head>
<body>
    <div class="kiosk-header">
        <h1>{{ snapshot.wall.name }}</h1>
        <p id="update-time" aria-live="polite">Loading...</p>
    </div>

    <div id="kiosk-content" class="kiosk-content"
         hx-get="{% url 'micboard:kiosk_content' snapshot.wall.id %}"
         hx-target="this" hx-trigger="every {{ snapshot.wall.refresh_interval_seconds }}s"
         hx-swap="innerHTML">
        {% include "micboard/kiosk/display_content.html" %}
    </div>

    <div class="kiosk-footer">
        <p>Last updated: <span id="footer-time">-</span> • Refresh every {{ snapshot.wall.refresh_interval_seconds }}s</p>
    </div>

    <form id="kiosk-heartbeat-form"
          action="{% url 'micboard:kiosk_display' snapshot.wall.kiosk_id %}" hidden>
        {% csrf_token %}
    </form>

    <script>
        // Heartbeat to notify server kiosk is active
        function sendHeartbeat() {
            const heartbeatForm = document.getElementById("kiosk-heartbeat-form");
            const csrfToken = heartbeatForm.querySelector(
                "input[name=csrfmiddlewaretoken]"
            ).value;
            fetch(heartbeatForm.action, {
                method: "POST",
                credentials: "same-origin",
                headers: {"X-CSRFToken": csrfToken},
            }).catch(error => console.error("Heartbeat failed:", error));
        }
        setInterval(sendHeartbeat, 30000);

        // Record only successful renders so stale displays remain visible to operators.
        function updateTimestamp() {
            const now = new Date();
            document.getElementById('update-time').textContent = now.toLocaleTimeString();
            document.getElementById('footer-time').textContent = now.toLocaleTimeString();
        }
        updateTimestamp();
        document.body.addEventListener("htmx:afterSwap", event => {
            if (event.detail.target.id === "kiosk-content") {
                updateTimestamp();
            }
        });
        function showRefreshError(event) {
            if (event.detail.target.id === "kiosk-content") {
                document.getElementById("update-time").textContent = "Refresh failed";
            }
        }
        document.body.addEventListener("htmx:responseError", showRefreshError);
        document.body.addEventListener("htmx:sendError", showRefreshError);

        // Hide cursor after inactivity
        let hideTimeout;
        document.addEventListener('mousemove', () => {
            document.body.style.cursor = 'auto';
            clearTimeout(hideTimeout);
            hideTimeout = setTimeout(() => {
                document.body.style.cursor = 'none';
            }, 3000);
        });
        hideTimeout = setTimeout(() => {
            document.body.style.cursor = 'none';
        }, 3000);
    </script>
</body>
</html>
