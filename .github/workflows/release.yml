---
name: Release & Publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: "CalVer version (YY.MM.DD)"
        required: true
      prerelease:
        description: "Mark as pre-release"
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: release
  cancel-in-progress: false  # Prevent concurrent releases

jobs:
  prepare-release:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      changelog: ${{ steps.changelog.outputs.content }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
        with:
          fetch-depth: 0

      - name: Validate version format
        id: version
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          if [[ ! "$RELEASE_VERSION" =~ ^[0-9]{2}\.[0-9]{2}\.[0-9]{2}$ ]]; then
            echo "Invalid CalVer format: $RELEASE_VERSION"
            exit 1
          fi
          echo "version=$RELEASE_VERSION" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        id: changelog
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
        run: |
          LATEST_TAG="$(git describe --tags --abbrev=0 2>/dev/null || true)"
          DELIMITER="release-changelog-$(git rev-parse HEAD)"
          {
            echo "content<<$DELIMITER"
            if grep -Fqx "version = \"$RELEASE_VERSION\"" pyproject.toml; then
              awk -v heading="## [$RELEASE_VERSION]" '
                index($0, heading) == 1 { in_release = 1; next }
                in_release && /^## \[/ { exit }
                in_release { print }
              ' CHANGELOG.md
            elif [ -n "$LATEST_TAG" ]; then
              git log "$LATEST_TAG"..HEAD --pretty=format:"%h - %s (%an)"
            else
              git log HEAD --pretty=format:"%h - %s (%an)"
            fi
            echo
            echo "$DELIMITER"
          } >> "$GITHUB_OUTPUT"

  test-before-release:
    needs: prepare-release
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          version: "0.11.28"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --locked --all-extras

      - name: Run full test suite
        run: |
          uv run --no-sync pytest tests/ \
            --cov=micboard \
            --cov-report=term-missing \
            --cov-fail-under=95 \
            -v
          uv run --no-sync python scripts/check_coverage_inventory.py

      - name: Check code quality
        run: |
          uv run --no-sync ruff format --check .
          uv run --no-sync ruff check .
          uv run --no-sync python -m mypy micboard
          uv run --no-sync bandit -r micboard -ll

  update-release-metadata:
    needs: [prepare-release, test-before-release]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release-sha: ${{ steps.release-commit.outputs.sha }}

    steps:
      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          version: "0.11.28"
          enable-cache: false

      # Persist the Git credential only after the final non-checkout action has completed.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Verify the release base is still current
        run: |
          git fetch --no-tags origin main
          if [ "$(git rev-parse origin/main)" != "$GITHUB_SHA" ]; then
            echo "main changed after this release workflow started; dispatch a new release"
            exit 1
          fi

      - name: Update version in pyproject.toml
        id: release-version
        env:
          RELEASE_VERSION: ${{ needs.prepare-release.outputs.version }}
        run: |
          if grep -Fqx "version = \"$RELEASE_VERSION\"" pyproject.toml; then
            echo "Version $RELEASE_VERSION is already current; reusing release metadata"
            echo "reuse=true" >> "$GITHUB_OUTPUT"
          else
            sed -i "s/^version = .*/version = \"$RELEASE_VERSION\"/" pyproject.toml
            echo "Updated version to: $RELEASE_VERSION"
            echo "reuse=false" >> "$GITHUB_OUTPUT"
          fi
          grep '^version' pyproject.toml

      - name: Update CHANGELOG
        env:
          RELEASE_CHANGELOG: ${{ needs.prepare-release.outputs.changelog }}
          RELEASE_VERSION: ${{ needs.prepare-release.outputs.version }}
        run: |
          if grep -q "^## \[$RELEASE_VERSION\]" CHANGELOG.md; then
            echo "CHANGELOG already contains version $RELEASE_VERSION; reusing it"
          else
            RELEASE_DATE="$(date +%Y-%m-%d)"
            awk \
              -v version="$RELEASE_VERSION" \
              -v release_date="$RELEASE_DATE" \
              -v release_changelog="$RELEASE_CHANGELOG" \
              '{ print } $0 == "## [Unreleased]" { print ""; print "## [" version "] - " release_date; print ""; print release_changelog; print "" }' \
              CHANGELOG.md > CHANGELOG.md.tmp
            mv CHANGELOG.md.tmp CHANGELOG.md
          fi

      - name: Refresh lockfile
        run: uv lock

      - name: Commit version update
        id: release-commit
        env:
          REUSE_RELEASE_METADATA: ${{ steps.release-version.outputs.reuse }}
          RELEASE_VERSION: ${{ needs.prepare-release.outputs.version }}
        run: |
          UNEXPECTED="$(git diff --name-only | grep -Ev '^(CHANGELOG.md|pyproject.toml|uv.lock)$' || true)"
          if [ -n "$UNEXPECTED" ]; then
            echo "Unexpected files changed during release preparation:"
            echo "$UNEXPECTED"
            exit 1
          fi
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add pyproject.toml uv.lock CHANGELOG.md
          if git diff --cached --quiet; then
            if [ "$REUSE_RELEASE_METADATA" != "true" ]; then
              echo "Release metadata unexpectedly produced no commit"
              exit 1
            fi
            if ! git diff "$GITHUB_SHA^" "$GITHUB_SHA" -- pyproject.toml \
              | grep -Fq "+version = \"$RELEASE_VERSION\""; then
              echo "main advanced beyond the original release metadata commit"
              exit 1
            fi
            if ! git diff "$GITHUB_SHA^" "$GITHUB_SHA" -- CHANGELOG.md \
              | grep -Fq "+## [$RELEASE_VERSION]"; then
              echo "Current HEAD did not introduce the requested CHANGELOG release"
              exit 1
            fi
            echo "Release metadata is already committed; continuing the failed release retry"
          else
            git diff --cached
            git commit -m "chore: bump version to $RELEASE_VERSION"
            git push origin HEAD:main
          fi
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  build-release:
    needs: [prepare-release, update-release-metadata]
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
        with:
          ref: ${{ needs.update-release-metadata.outputs.release-sha }}
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          version: "0.11.28"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Verify the exact release commit
        env:
          RELEASE_SHA: ${{ needs.update-release-metadata.outputs.release-sha }}
          RELEASE_VERSION: ${{ needs.prepare-release.outputs.version }}
        run: |
          test "$(git rev-parse HEAD)" = "$RELEASE_SHA"
          grep -Fqx "version = \"$RELEASE_VERSION\"" pyproject.toml

      - name: Build distribution
        run: |
          uv build --sdist --clear
          uv build --wheel dist/*.tar.gz

      - name: Check distribution
        run: |
          uvx --from "twine==6.2.0" twine check dist/*
          uv run --no-project python scripts/validate_wheel.py dist/*.whl
          uv run --no-project --with dist/*.whl python scripts/smoke_test_installed_wheel.py

      - name: Seal distribution checksums
        run: |
          cd dist
          sha256sum ./*.whl ./*.tar.gz > SHA256SUMS
          sha256sum --check SHA256SUMS

      - name: Upload sealed distribution
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: distribution-${{ needs.prepare-release.outputs.version }}
          path: dist/
          if-no-files-found: error
          retention-days: 30
          compression-level: 0

  publish-testpypi:
    if: inputs.prerelease
    needs: [prepare-release, build-release]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment:
      name: testpypi
      url: https://test.pypi.org/p/django-micboard/${{ needs.prepare-release.outputs.version }}

    steps:
      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          version: "0.11.28"
          enable-cache: false

      - name: Download sealed distribution
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: distribution-${{ needs.prepare-release.outputs.version }}
          path: dist

      - name: Verify distribution checksums
        run: cd dist && sha256sum --check SHA256SUMS

      - name: Publish to TestPyPI
        run: >-
          uv publish --trusted-publishing always --no-config
          --publish-url https://test.pypi.org/legacy/
          --check-url https://test.pypi.org/simple/
          dist/*.whl dist/*.tar.gz

  publish-pypi:
    if: ${{ ! inputs.prerelease }}
    needs: [prepare-release, build-release]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment:
      name: pypi-release
      url: https://pypi.org/p/django-micboard/${{ needs.prepare-release.outputs.version }}

    steps:
      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          version: "0.11.28"
          enable-cache: false

      - name: Download sealed distribution
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: distribution-${{ needs.prepare-release.outputs.version }}
          path: dist

      - name: Verify distribution checksums
        run: cd dist && sha256sum --check SHA256SUMS

      - name: Publish to PyPI
        run: >-
          uv publish --trusted-publishing always --no-config
          --check-url https://pypi.org/simple/
          dist/*.whl dist/*.tar.gz

  create-github-release:
    needs:
      - prepare-release
      - update-release-metadata
      - build-release
      - publish-testpypi
      - publish-pypi
    if: >-
      always() &&
      needs.update-release-metadata.result == 'success' &&
      needs.build-release.result == 'success' &&
      ((inputs.prerelease && needs.publish-testpypi.result == 'success') ||
      (!inputs.prerelease && needs.publish-pypi.result == 'success'))
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Create GitHub Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228  # v3
        with:
          tag_name: v${{ needs.prepare-release.outputs.version }}
          target_commitish: ${{ needs.update-release-metadata.outputs.release-sha }}
          name: Release ${{ needs.prepare-release.outputs.version }}
          body: ${{ needs.prepare-release.outputs.changelog }}
          draft: false
          prerelease: ${{ inputs.prerelease }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
