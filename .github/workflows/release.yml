---
name: Release & Publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: "CalVer version (YY.MM.DD)"
        required: true
      prerelease:
        description: "Mark as pre-release"
        required: false
        default: false

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: release
  cancel-in-progress: false  # Prevent concurrent releases

jobs:
  prepare-release:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      changelog: ${{ steps.changelog.outputs.content }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
        with:
          fetch-depth: 0

      - name: Validate version format
        id: version
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          if [[ ! "$RELEASE_VERSION" =~ ^[0-9]{2}\.[0-9]{2}\.[0-9]{2}$ ]]; then
            echo "Invalid CalVer format: $RELEASE_VERSION"
            exit 1
          fi
          echo "version=$RELEASE_VERSION" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        id: changelog
        run: |
          LATEST_TAG="$(git describe --tags --abbrev=0 2>/dev/null || true)"
          {
            echo "content<<EOF"
            if [ -n "$LATEST_TAG" ]; then
              git log "$LATEST_TAG"..HEAD --pretty=format:"%h - %s (%an)"
            else
              git log HEAD --pretty=format:"%h - %s (%an)"
            fi
            echo "EOF"
          } >> $GITHUB_OUTPUT

  test-before-release:
    needs: prepare-release
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          version: "0.11.28"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --locked --all-extras

      - name: Run full test suite
        run: |
          uv run --no-sync pytest tests/ \
            --cov=micboard \
            --cov-report=term-missing \
            --cov-fail-under=49 \
            -v

      - name: Check code quality
        run: |
          uv run --no-sync ruff format --check .
          uv run --no-sync ruff check .
          uv run --no-sync python -m mypy micboard

  build-and-publish:
    needs: [prepare-release, test-before-release]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write  # Required for trusted publishing to PyPI
    environment:
      name: pypi-release
      url: https://pypi.org/p/django-micboard/${{ needs.prepare-release.outputs.version }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          version: "0.11.28"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Update version in pyproject.toml
        run: |
          VERSION="${{ needs.prepare-release.outputs.version }}"
          if ! sed -i "s/^version = .*/version = \"$VERSION\"/" pyproject.toml; then
            echo "Error: Failed to update version in pyproject.toml"
            exit 1
          fi
          echo "Updated version to: $VERSION"
          grep '^version' pyproject.toml

      - name: Update CHANGELOG
        env:
          RELEASE_CHANGELOG: ${{ needs.prepare-release.outputs.changelog }}
        run: |
          VERSION="${{ needs.prepare-release.outputs.version }}"
          RELEASE_DATE="$(date +%Y-%m-%d)"
          awk \
            -v version="$VERSION" \
            -v release_date="$RELEASE_DATE" \
            -v release_changelog="$RELEASE_CHANGELOG" \
            '{ print } $0 == "## [Unreleased]" { print ""; print "## [" version "] - " release_date; print ""; print release_changelog; print "" }' \
            CHANGELOG.md > CHANGELOG.md.tmp
          mv CHANGELOG.md.tmp CHANGELOG.md

      - name: Refresh lockfile
        run: uv lock

      - name: Build distribution
        run: |
          uv build --sdist --clear
          uv build --wheel dist/*.tar.gz

      - name: Check distribution
        run: uvx --from twine twine check dist/*

      - name: Commit version update
        id: release-commit
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add pyproject.toml uv.lock CHANGELOG.md
          git diff --cached
          git commit -m "chore: bump version to ${{ needs.prepare-release.outputs.version }}"
          git push origin HEAD:main
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Publish to TestPyPI
        if: github.event.inputs.prerelease == 'true'
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          print-hash: true

      - name: Publish to PyPI
        if: github.event.inputs.prerelease == 'false'
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # release/v1
        with:
          print-hash: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228  # v3
        with:
          tag_name: v${{ needs.prepare-release.outputs.version }}
          target_commitish: ${{ steps.release-commit.outputs.sha }}
          name: Release ${{ needs.prepare-release.outputs.version }}
          body: ${{ needs.prepare-release.outputs.changelog }}
          draft: false
          prerelease: ${{ github.event.inputs.prerelease }}
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: distribution-${{ needs.prepare-release.outputs.version }}
          path: dist/
          retention-days: 30
