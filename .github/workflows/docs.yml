---
name: Documentation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-docs:
    if: "!startsWith(github.head_ref, 'renovate/') && !startsWith(github.ref, 'refs/heads/renovate/')"
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

    - name: Install uv
      uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
      with:
        version: "0.11.28"
        enable-cache: true

    - name: Set up Python
      run: uv python install 3.13

    - name: Install dependencies
      run: uv sync --locked --extra docs

    - name: Build documentation
      run: uv run --no-sync mkdocs build

    - name: Validate documentation structure
      run: |
        if [ ! -d "site" ] || [ ! -f "site/index.html" ]; then
          echo "Error: Documentation build failed - site/index.html not found"
          exit 1
        fi

    - name: Upload documentation artifact
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
      with:
        name: documentation
        path: site/
        retention-days: 30
        if-no-files-found: error  # Fail if no files found
