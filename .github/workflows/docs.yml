---
name: Documentation
run-name: "Docs · ${{ github.head_ref || github.ref_name }}"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-docs:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
        with:
          persist-credentials: false

      - name: Set up uv and Python
        uses: ./.github/actions/setup-uv-python

      - name: Install dependencies
        run: uv sync --locked --extra docs

      - name: Build documentation
        run: uv run --no-sync mkdocs build --strict

      - name: Validate documentation structure
        run: |
          if [ ! -d "site" ] || [ ! -f "site/index.html" ]; then
            echo "Error: Documentation build failed - site/index.html not found"
            exit 1
          fi

      - name: Upload documentation artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: documentation
          path: site/
          retention-days: 30
          if-no-files-found: error  # Fail if no files found