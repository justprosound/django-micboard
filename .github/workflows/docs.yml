---
name: Documentation
run-name: "Docs · ${{ github.event.pull_request.number && format('PR #{0}', github.event.pull_request.number) || github.ref_name }}"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-docs:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7

    - name: Install uv
      uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
      with:
        version: "0.11.28"
        enable-cache: true

    - name: Set up Python
      run: uv python install 3.13

    - name: Install dependencies
      run: uv sync --locked --extra docs

    - name: Build documentation
      run: uv run --no-sync mkdocs build

    - name: Validate documentation structure
      run: |
        if [ ! -d "site" ] || [ ! -f "site/index.html" ]; then
          echo "Error: Documentation build failed - site/index.html not found"
          exit 1
        fi

    - name: Upload documentation artifact
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
      with:
        name: documentation
        path: site/
        retention-days: 30
        if-no-files-found: error  # Fail if no files found
