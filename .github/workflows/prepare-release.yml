---
name: Prepare Release PR
run-name: "Prepare release · ${{ inputs.version || 'automatic CalVer' }}"

on:
  workflow_dispatch:
    inputs:
      version:
        description: "CalVer override (YY.MM.DD); blank uses the current UTC date"
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: release-preparation
  cancel-in-progress: false

jobs:
  prepare-release:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      changelog: ${{ steps.changelog.outputs.content }}
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Validate version format
        id: version
        env:
          REQUESTED_VERSION: ${{ inputs.version }}
        run: |
          RELEASE_VERSION="${REQUESTED_VERSION:-$(date -u +%y.%m.%d)}"
          if [[ ! "$RELEASE_VERSION" =~ ^[0-9]{2}\.[0-9]{2}\.[0-9]{2}$ ]]; then
            echo "Invalid CalVer format: $RELEASE_VERSION"
            exit 1
          fi
          if git show-ref --verify --quiet "refs/tags/v$RELEASE_VERSION"; then
            echo "Release v$RELEASE_VERSION already exists"
            exit 1
          fi
          echo "version=$RELEASE_VERSION" >> "$GITHUB_OUTPUT"
          echo "### Preparing release v$RELEASE_VERSION" >> "$GITHUB_STEP_SUMMARY"

      - name: Generate changelog
        id: changelog
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
        run: |
          LATEST_TAG="$(git describe --tags --abbrev=0 2>/dev/null || true)"
          DELIMITER="release-changelog-$(git rev-parse HEAD)"
          {
            echo "content<<$DELIMITER"
            if grep -Fqx "version = \"$RELEASE_VERSION\"" pyproject.toml; then
              awk -v heading="## [$RELEASE_VERSION]" '
                index($0, heading) == 1 { in_release = 1; next }
                in_release && /^## \[/ { exit }
                in_release { print }
              ' CHANGELOG.md
            elif [ -n "$LATEST_TAG" ]; then
              git log "$LATEST_TAG"..HEAD --pretty=format:"%h - %s (%an)"
            else
              git log HEAD --pretty=format:"%h - %s (%an)"
            fi
            echo
            echo "$DELIMITER"
          } >> "$GITHUB_OUTPUT"

  open-release-pr:
    needs: prepare-release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write
    outputs:
      branch: ${{ steps.release-pr.outputs.branch }}
      number: ${{ steps.release-pr.outputs.number }}
      sha: ${{ steps.release-pr.outputs.sha }}
      url: ${{ steps.release-pr.outputs.url }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up uv and Python
        uses: ./.github/actions/setup-uv-python
        with:
          enable-cache: "false"

      - name: Verify the release base is still current
        env:
          RELEASE_BRANCH: release/v${{ needs.prepare-release.outputs.version }}
        run: |
          git fetch --no-tags origin main
          if [ "$(git rev-parse origin/main)" != "$GITHUB_SHA" ]; then
            echo "main changed after this release workflow started; dispatch a new release"
            exit 1
          fi

      - name: Update release metadata
        env:
          RELEASE_CHANGELOG: ${{ needs.prepare-release.outputs.changelog }}
          RELEASE_VERSION: ${{ needs.prepare-release.outputs.version }}
        run: |
          sed -i "s/^version = .*/version = \"$RELEASE_VERSION\"/" pyproject.toml
          if ! grep -q "^## \[$RELEASE_VERSION\]" CHANGELOG.md; then
            RELEASE_DATE="$(date +%Y-%m-%d)"
            awk \
              -v version="$RELEASE_VERSION" \
              -v release_date="$RELEASE_DATE" \
              -v release_changelog="$RELEASE_CHANGELOG" \
              '{
                print
              }
              $0 == "## [Unreleased]" {
                print ""
                print "## [" version "] - " release_date
                print ""
                print release_changelog
                print ""
              }' \
              CHANGELOG.md > CHANGELOG.md.tmp
            mv CHANGELOG.md.tmp CHANGELOG.md
          fi
          uv lock

      - name: Open release pull request
        id: release-pr
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_BRANCH: release/v${{ needs.prepare-release.outputs.version }}
          RELEASE_VERSION: ${{ needs.prepare-release.outputs.version }}
        run: |
          UNEXPECTED="$(git diff --name-only | grep -Ev '^(CHANGELOG.md|pyproject.toml|uv.lock)$' || true)"
          if [ -n "$UNEXPECTED" ]; then
            echo "Unexpected files changed during release preparation:"
            echo "$UNEXPECTED"
            exit 1
          fi
          if git diff --quiet; then
            echo "Release metadata did not change"
            exit 1
          fi
          git diff --check
          git diff

          if gh api "repos/$GITHUB_REPOSITORY/git/ref/heads/$RELEASE_BRANCH" \
            >/dev/null 2>&1; then
            gh api \
              --method PATCH \
              "repos/$GITHUB_REPOSITORY/git/refs/heads/$RELEASE_BRANCH" \
              -f sha="$GITHUB_SHA" \
              -F force=true \
              >/dev/null
          else
            gh api \
              --method POST \
              "repos/$GITHUB_REPOSITORY/git/refs" \
              -f ref="refs/heads/$RELEASE_BRANCH" \
              -f sha="$GITHUB_SHA" \
              >/dev/null
          fi

          jq \
            --null-input \
            --arg repository "$GITHUB_REPOSITORY" \
            --arg branch "$RELEASE_BRANCH" \
            --arg expected_head_oid "$GITHUB_SHA" \
            --arg message "chore: bump version to $RELEASE_VERSION" \
            --rawfile changelog CHANGELOG.md \
            --rawfile pyproject pyproject.toml \
            --rawfile lockfile uv.lock \
            '{
              query: "mutation($input: CreateCommitOnBranchInput!) { createCommitOnBranch(input: $input) { commit { oid url } } }",
              variables: {
                input: {
                  branch: {
                    repositoryNameWithOwner: $repository,
                    branchName: $branch
                  },
                  message: {headline: $message},
                  expectedHeadOid: $expected_head_oid,
                  fileChanges: {
                    additions: [
                      {path: "CHANGELOG.md", contents: ($changelog | @base64)},
                      {path: "pyproject.toml", contents: ($pyproject | @base64)},
                      {path: "uv.lock", contents: ($lockfile | @base64)}
                    ]
                  }
                }
              }
            }' > "$RUNNER_TEMP/release-commit.json"
          RELEASE_SHA="$(gh api graphql \
            --input "$RUNNER_TEMP/release-commit.json" \
            --jq '.data.createCommitOnBranch.commit.oid')"
          if [[ ! "$RELEASE_SHA" =~ ^[0-9a-f]{40}$ ]]; then
            echo "GitHub did not return a valid release commit"
            exit 1
          fi
          VERIFIED="$(gh api \
            "repos/$GITHUB_REPOSITORY/commits/$RELEASE_SHA" \
            --jq '.commit.verification.verified')"
          if [ "$VERIFIED" != "true" ]; then
            echo "GitHub did not verify the generated release commit"
            exit 1
          fi

          PR_URL="$(gh pr list --base main --head "$RELEASE_BRANCH" --state open --json url --jq '.[0].url')"
          if [ -z "$PR_URL" ]; then
            PR_URL="$(gh pr create \
              --base main \
              --head "$RELEASE_BRANCH" \
              --title "chore: release $RELEASE_VERSION" \
              --body "Prepare release $RELEASE_VERSION through the protected main branch.")"
          fi
          PR_NUMBER="$(gh pr view "$PR_URL" --json number --jq '.number')"
          echo "branch=$RELEASE_BRANCH" >> "$GITHUB_OUTPUT"
          echo "number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "sha=$RELEASE_SHA" >> "$GITHUB_OUTPUT"
          echo "url=$PR_URL" >> "$GITHUB_OUTPUT"

  validate-release-pr:
    needs: open-release-pr
    runs-on: ubuntu-latest
    timeout-minutes: 50
    permissions:
      actions: write

    steps:
      - name: Dispatch and observe required checks
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_BRANCH: ${{ needs.open-release-pr.outputs.branch }}
          RELEASE_SHA: ${{ needs.open-release-pr.outputs.sha }}
        run: |
          if [[ ! "$RELEASE_SHA" =~ ^[0-9a-f]{40}$ ]]; then
            echo "Release pull request returned an invalid head commit: $RELEASE_SHA"
            exit 1
          fi

          DISPATCHED_AT="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          gh workflow run ci.yml --repo "$GITHUB_REPOSITORY" --ref "$RELEASE_BRANCH"
          gh workflow run dependency-review.yml \
            --repo "$GITHUB_REPOSITORY" \
            --ref "$RELEASE_BRANCH" \
            --field base_ref=main \
            --field head_ref="$RELEASE_BRANCH"
          gh workflow run docs.yml --repo "$GITHUB_REPOSITORY" --ref "$RELEASE_BRANCH"

          find_dispatched_run() {
            local workflow="$1"
            local run_id
            for attempt in {1..30}; do
              run_id="$(gh run list \
                --repo "$GITHUB_REPOSITORY" \
                --workflow "$workflow" \
                --branch "$RELEASE_BRANCH" \
                --event workflow_dispatch \
                --limit 20 \
                --json createdAt,databaseId,headSha \
                --jq ".[] | select(.headSha == \"$RELEASE_SHA\" and .createdAt >= \"$DISPATCHED_AT\") | .databaseId" \
                | head -n 1)"
              if [[ "$run_id" =~ ^[0-9]+$ ]]; then
                echo "$run_id"
                return 0
              fi
              echo "Waiting for $workflow dispatch (attempt $attempt/30)" >&2
              sleep 2
            done
            echo "Unable to identify dispatched $workflow run for $RELEASE_SHA" >&2
            return 1
          }

          CI_RUN_ID="$(find_dispatched_run ci.yml)"
          DEPENDENCY_RUN_ID="$(find_dispatched_run dependency-review.yml)"
          DOCS_RUN_ID="$(find_dispatched_run docs.yml)"
          gh run watch "$CI_RUN_ID" --repo "$GITHUB_REPOSITORY" --exit-status
          gh run watch "$DEPENDENCY_RUN_ID" --repo "$GITHUB_REPOSITORY" --exit-status
          gh run watch "$DOCS_RUN_ID" --repo "$GITHUB_REPOSITORY" --exit-status

  merge-release-pr:
    needs: [prepare-release, open-release-pr, validate-release-pr]
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write
      pull-requests: write

    outputs:
      sha: ${{ steps.release-merge.outputs.sha }}

    steps:
      - name: Enable protected merge after successful checks
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ needs.open-release-pr.outputs.number }}
        run: |
          gh pr merge "$PR_NUMBER" \
            --repo "$GITHUB_REPOSITORY" \
            --auto \
            --delete-branch \
            --squash

      - name: Wait for the protected pull request to merge
        id: release-merge
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ needs.open-release-pr.outputs.number }}
        run: |
          for attempt in {1..120}; do
            PR_STATE="$(gh pr view "$PR_NUMBER" \
              --repo "$GITHUB_REPOSITORY" \
              --json mergedAt,state \
              --jq 'if .mergedAt then "merged" else (.state | ascii_downcase) end')"
            if [ "$PR_STATE" = "merged" ]; then
              MERGE_SHA="$(gh pr view "$PR_NUMBER" \
                --repo "$GITHUB_REPOSITORY" \
                --json mergeCommit \
                --jq '.mergeCommit.oid')"
              if [[ ! "$MERGE_SHA" =~ ^[0-9a-f]{40}$ ]]; then
                echo "Release pull request returned an invalid merge commit: $MERGE_SHA"
                exit 1
              fi
              echo "sha=$MERGE_SHA" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            if [ "$PR_STATE" = "closed" ]; then
              echo "Release pull request closed without merging"
              exit 1
            fi
            echo "Waiting for protected release pull request checks (attempt $attempt/120)"
            sleep 15
          done
          echo "Timed out waiting for the protected release pull request to merge"
          exit 1

  dispatch-publication:
    needs: [prepare-release, merge-release-pr]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      actions: write

    steps:
      - name: Publish the merged release
        env:
          GH_TOKEN: ${{ github.token }}
          MERGE_SHA: ${{ needs.merge-release-pr.outputs.sha }}
          RELEASE_VERSION: ${{ needs.prepare-release.outputs.version }}
        run: |
          gh workflow run publish-release.yml \
            --repo "$GITHUB_REPOSITORY" \
            --ref main \
            --field expected_sha="$MERGE_SHA" \
            --field version="$RELEASE_VERSION"
