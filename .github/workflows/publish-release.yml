---
name: Publish Release
run-name: "Publish release v${{ inputs.version }}"

on:
  workflow_dispatch:
    inputs:
      expected_sha:
        description: "Merge commit selected by the protected release workflow"
        required: true
      version:
        description: "CalVer version already merged to main (YY.MM.DD)"
        required: true
      prerelease:
        description: "Publish to TestPyPI instead of PyPI"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: publish-release
  cancel-in-progress: false

jobs:
  validate-release:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      changelog: ${{ steps.changelog.outputs.content }}
      sha: ${{ steps.release.outputs.sha }}
      version: ${{ steps.release.outputs.version }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ inputs.expected_sha }}

      - name: Validate merged release metadata
        id: release
        env:
          EXPECTED_SHA: ${{ inputs.expected_sha }}
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          if [[ ! "$EXPECTED_SHA" =~ ^[0-9a-f]{40}$ ]]; then
            echo "Invalid release commit: $EXPECTED_SHA"
            exit 1
          fi
          if [ "$(git rev-parse HEAD)" != "$EXPECTED_SHA" ]; then
            echo "Checked-out commit does not match the selected release merge"
            exit 1
          fi
          git fetch --no-tags origin main
          if ! git merge-base --is-ancestor "$EXPECTED_SHA" origin/main; then
            echo "Selected release merge is not part of protected main"
            exit 1
          fi
          if [[ ! "$RELEASE_VERSION" =~ ^[0-9]{2}\.[0-9]{2}\.[0-9]{2}$ ]]; then
            echo "Invalid CalVer format: $RELEASE_VERSION"
            exit 1
          fi
          grep -Fqx "version = \"$RELEASE_VERSION\"" pyproject.toml
          grep -q "^## \[$RELEASE_VERSION\]" CHANGELOG.md
          if git show-ref --verify --quiet "refs/tags/v$RELEASE_VERSION"; then
            echo "Release v$RELEASE_VERSION already exists"
            exit 1
          fi
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "version=$RELEASE_VERSION" >> "$GITHUB_OUTPUT"

      - name: Read release changelog
        id: changelog
        env:
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
        run: |
          DELIMITER="release-changelog-$(git rev-parse HEAD)"
          {
            echo "content<<$DELIMITER"
            awk -v heading="## [$RELEASE_VERSION]" '
              index($0, heading) == 1 { in_release = 1; next }
              in_release && /^## \[/ { exit }
              in_release { print }
            ' CHANGELOG.md
            echo "$DELIMITER"
          } >> "$GITHUB_OUTPUT"

  build-release:
    needs: validate-release
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
        with:
          ref: ${{ needs.validate-release.outputs.sha }}
          persist-credentials: false

      - name: Set up uv and Python
        uses: ./.github/actions/setup-uv-python

      - name: Build distribution
        run: |
          uv build --sdist --clear
          uv build --wheel dist/*.tar.gz

      - name: Check distribution
        run: |
          uvx --from "twine==6.2.0" twine check dist/*
          uv run --no-project python scripts/validate_wheel.py dist/*.whl
          uv run --no-project --with dist/*.whl python scripts/smoke_test_installed_wheel.py

      - name: Seal distribution checksums
        run: |
          cd dist
          sha256sum ./*.whl ./*.tar.gz > SHA256SUMS
          sha256sum --check SHA256SUMS

      - name: Upload sealed distribution
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: distribution-${{ needs.validate-release.outputs.version }}
          path: dist/
          if-no-files-found: error
          retention-days: 30
          compression-level: 0

  attest-release:
    needs: [validate-release, build-release]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      attestations: write
      id-token: write

    steps:
      - name: Download sealed distribution
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: distribution-${{ needs.validate-release.outputs.version }}
          path: dist

      - name: Verify distribution checksums
        run: cd dist && sha256sum --check SHA256SUMS

      - name: Attest distribution provenance
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763  # v4.1.1
        with:
          subject-path: |
            dist/*.whl
            dist/*.tar.gz

  publish-testpypi:
    if: inputs.prerelease
    needs: [validate-release, build-release, attest-release]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
    environment:
      name: testpypi
      url: https://test.pypi.org/p/django-micboard/${{ needs.validate-release.outputs.version }}

    steps:
      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          version: "0.11.28"
          enable-cache: false

      - name: Download sealed distribution
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: distribution-${{ needs.validate-release.outputs.version }}
          path: dist

      - name: Verify distribution checksums
        run: cd dist && sha256sum --check SHA256SUMS

      - name: Publish to TestPyPI
        run: >-
          uv publish --trusted-publishing always --no-config
          --publish-url https://test.pypi.org/legacy/
          --check-url https://test.pypi.org/simple/
          dist/*.whl dist/*.tar.gz

  publish-pypi:
    if: ${{ ! inputs.prerelease }}
    needs: [validate-release, build-release, attest-release]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
    environment:
      name: pypi-release
      url: https://pypi.org/p/django-micboard/${{ needs.validate-release.outputs.version }}

    steps:
      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          version: "0.11.28"
          enable-cache: false

      - name: Download sealed distribution
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: distribution-${{ needs.validate-release.outputs.version }}
          path: dist

      - name: Verify distribution checksums
        run: cd dist && sha256sum --check SHA256SUMS

      - name: Publish to PyPI
        run: >-
          uv publish --trusted-publishing always --no-config
          --check-url https://pypi.org/simple/
          dist/*.whl dist/*.tar.gz

  create-github-release:
    needs:
      - validate-release
      - build-release
      - attest-release
      - publish-testpypi
      - publish-pypi
    if: >-
      always() &&
      needs.validate-release.result == 'success' &&
      needs.build-release.result == 'success' &&
      needs.attest-release.result == 'success' &&
      ((inputs.prerelease && needs.publish-testpypi.result == 'success') ||
      (!inputs.prerelease && needs.publish-pypi.result == 'success'))
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Create GitHub Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228  # v3
        with:
          tag_name: v${{ needs.validate-release.outputs.version }}
          target_commitish: ${{ needs.validate-release.outputs.sha }}
          name: Release ${{ needs.validate-release.outputs.version }}
          body: ${{ needs.validate-release.outputs.changelog }}
          draft: false
          prerelease: ${{ inputs.prerelease }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
