---
name: Publish Release
run-name: "Publish release v${{ inputs.version }}"

on:
  workflow_dispatch:
    inputs:
      expected_sha:
        description: "Merge commit selected by the protected release workflow"
        required: true
      version:
        description: "CalVer version already merged to main (YY.MM.DD[.N])"
        required: true

permissions:
  contents: read

concurrency:
  group: publish-release
  cancel-in-progress: false

jobs:
  validate-release:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      changelog: ${{ steps.changelog.outputs.content }}
      sha: ${{ steps.release.outputs.sha }}
      source-date-epoch: ${{ steps.release.outputs.source-date-epoch }}
      version: ${{ steps.release.outputs.version }}

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ inputs.expected_sha }}

      - name: Validate merged release metadata
        id: release
        env:
          EXPECTED_SHA: ${{ inputs.expected_sha }}
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          if [[ ! "$EXPECTED_SHA" =~ ^[0-9a-f]{40}$ ]]; then
            echo "Invalid release commit: $EXPECTED_SHA"
            exit 1
          fi
          if [ "$(git rev-parse HEAD)" != "$EXPECTED_SHA" ]; then
            echo "Checked-out commit does not match the selected release merge"
            exit 1
          fi
          git fetch --no-tags origin main
          if ! git merge-base --is-ancestor "$EXPECTED_SHA" origin/main; then
            echo "Selected release merge is not part of protected main"
            exit 1
          fi
          if [[ ! "$RELEASE_VERSION" =~ ^[0-9]{2}\.[0-9]{2}\.[0-9]{2}(\.[1-9][0-9]*)?$ ]]; then
            echo "Invalid CalVer format: $RELEASE_VERSION"
            exit 1
          fi
          grep -Fqx "version = \"$RELEASE_VERSION\"" pyproject.toml
          grep -q "^## \[$RELEASE_VERSION\]" CHANGELOG.md
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "source-date-epoch=$(git show -s --format=%ct HEAD)" >> "$GITHUB_OUTPUT"
          echo "version=$RELEASE_VERSION" >> "$GITHUB_OUTPUT"

      - name: Read release changelog
        id: changelog
        env:
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
        run: |
          DELIMITER="release-changelog-$(git rev-parse HEAD)"
          {
            echo "content<<$DELIMITER"
            awk -v heading="## [$RELEASE_VERSION]" '
              index($0, heading) == 1 { in_release = 1; next }
              in_release && /^## \[/ { exit }
              in_release { print }
            ' CHANGELOG.md
            echo "$DELIMITER"
          } >> "$GITHUB_OUTPUT"

  build-release:
    needs: validate-release
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SOURCE_DATE_EPOCH: ${{ needs.validate-release.outputs.source-date-epoch }}
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7
        with:
          ref: ${{ needs.validate-release.outputs.sha }}
          persist-credentials: false

      - name: Set up uv and Python
        uses: ./.github/actions/setup-uv-python

      - name: Build distribution
        run: |
          uv build --no-sources --sdist --clear
          uv run --no-project python scripts/normalize_sdist.py dist/*.tar.gz
          uv build --no-sources --wheel dist/*.tar.gz

      - name: Export locked release toolchain
        run: >-
          uv export --locked --only-group release --no-emit-project
          --output-file release-tools.txt

      - name: Check distribution
        run: |
          uv run --no-project --no-config --with-requirements release-tools.txt -- \
            twine check dist/*
          uv run --no-project python scripts/validate_wheel.py dist/*.whl
          uv run --no-project --with dist/*.whl python scripts/smoke_test_installed_wheel.py

      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610  # v0.24.0
        with:
          path: dist
          format: spdx-json
          output-file: dist/django-micboard-${{ needs.validate-release.outputs.version }}.spdx.json
          syft-version: "v1.46.0"
          upload-artifact: false
          upload-release-assets: false

      - name: Seal distribution checksums
        run: |
          cd dist
          sha256sum ./*.whl ./*.tar.gz ./*.spdx.json > SHA256SUMS
          sha256sum --check SHA256SUMS

      - name: Upload sealed distribution
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: distribution-${{ needs.validate-release.outputs.version }}
          path: dist/
          if-no-files-found: error
          retention-days: 30
          compression-level: 0
          overwrite: true

      - name: Upload locked release attestation toolchain
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: release-attestation-tools-${{ needs.validate-release.outputs.version }}
          path: release-tools.txt
          if-no-files-found: error
          retention-days: 30
          overwrite: true

  attest-release:
    needs: [validate-release, build-release]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      attestations: write
      id-token: write

    steps:
      - name: Download sealed distribution
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: distribution-${{ needs.validate-release.outputs.version }}
          path: dist

      - name: Verify distribution checksums
        run: cd dist && sha256sum --check SHA256SUMS

      - name: Attest distribution provenance
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6  # v4.2.0
        with:
          subject-path: |
            dist/*.whl
            dist/*.tar.gz

      - name: Attest distribution SBOM
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6  # v4.2.0
        with:
          subject-path: |
            dist/*.whl
            dist/*.tar.gz
          sbom-path: dist/django-micboard-${{ needs.validate-release.outputs.version }}.spdx.json

  publish-testpypi:
    needs: [validate-release, build-release, attest-release]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
    environment:
      name: testpypi
      url: https://test.pypi.org/p/django-micboard/${{ needs.validate-release.outputs.version }}

    steps:
      - name: Install uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9  # v9.0.0
        with:
          version: "0.11.30"
          enable-cache: false

      - name: Download sealed distribution
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: distribution-${{ needs.validate-release.outputs.version }}
          path: dist

      - name: Download locked release attestation toolchain
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: release-attestation-tools-${{ needs.validate-release.outputs.version }}

      - name: Verify distribution checksums
        run: cd dist && sha256sum --check SHA256SUMS

      - name: Create TestPyPI publish attestations
        run: |
          uv run --no-project --no-config --with-requirements release-tools.txt -- \
            python -m pypi_attestations sign dist/*.whl dist/*.tar.gz
          test "$(find dist -maxdepth 1 -name '*.publish.attestation' | wc -l)" -eq 2

      - name: Publish to TestPyPI
        run: >-
          uv publish --trusted-publishing always --no-config
          --publish-url https://test.pypi.org/legacy/
          --check-url https://test.pypi.org/simple/
          dist/*.whl dist/*.tar.gz

      - name: Upload TestPyPI-signed distribution
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: testpypi-distribution-${{ needs.validate-release.outputs.version }}
          path: dist/
          if-no-files-found: error
          retention-days: 30
          compression-level: 0
          overwrite: true

  verify-testpypi:
    needs: [validate-release, build-release, publish-testpypi]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Download sealed distribution
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: distribution-${{ needs.validate-release.outputs.version }}
          path: dist

      - name: Verify TestPyPI distribution digests
        env:
          RELEASE_VERSION: ${{ needs.validate-release.outputs.version }}
        run: |
          for attempt in {1..30}; do
            if curl \
              --fail \
              --silent \
              --show-error \
              --output "$RUNNER_TEMP/testpypi-release.json" \
              "https://test.pypi.org/pypi/django-micboard/$RELEASE_VERSION/json"; then
              MATCHED=true
              while read -r expected filename; do
                filename="${filename#./}"
                actual="$(jq \
                  --arg filename "$filename" \
                  --raw-output \
                  '.urls[] | select(.filename == $filename) | .digests.sha256' \
                  "$RUNNER_TEMP/testpypi-release.json")"
                if [ "$actual" != "$expected" ]; then
                  echo "TestPyPI digest mismatch for $filename"
                  MATCHED=false
                fi
              done < <(grep -E '\.(whl|tar\.gz)$' dist/SHA256SUMS)
              if [ "$MATCHED" = true ]; then
                exit 0
              fi
            fi
            echo "Waiting for TestPyPI release metadata (attempt $attempt/30)"
            sleep 5
          done
          echo "TestPyPI did not expose the sealed release files"
          exit 1

  publish-pypi:
    needs: [validate-release, build-release, attest-release, verify-testpypi]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
    environment:
      name: pypi-release
      url: https://pypi.org/p/django-micboard/${{ needs.validate-release.outputs.version }}

    steps:
      - name: Verify maintainer-signed release tag
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_SHA: ${{ needs.validate-release.outputs.sha }}
          RELEASE_TAG: v${{ needs.validate-release.outputs.version }}
        run: |
          TAG_OBJECT_SHA="$(gh api \
            "repos/$GITHUB_REPOSITORY/git/ref/tags/$RELEASE_TAG" \
            --jq 'select(.object.type == "tag") | .object.sha')"
          if [[ ! "$TAG_OBJECT_SHA" =~ ^[0-9a-f]{40}$ ]]; then
            echo "Release tag $RELEASE_TAG must be an annotated tag"
            exit 1
          fi
          if ! gh api "repos/$GITHUB_REPOSITORY/git/tags/$TAG_OBJECT_SHA" \
            | jq --exit-status \
              --arg expected_sha "$RELEASE_SHA" \
              '.object.type == "commit" and
               .object.sha == $expected_sha and
               .verification.verified == true' \
            >/dev/null; then
            echo "Release tag $RELEASE_TAG must be verified and target $RELEASE_SHA"
            exit 1
          fi

      - name: Install uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9  # v9.0.0
        with:
          version: "0.11.30"
          enable-cache: false

      - name: Download sealed distribution
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: distribution-${{ needs.validate-release.outputs.version }}
          path: dist

      - name: Download locked release attestation toolchain
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: release-attestation-tools-${{ needs.validate-release.outputs.version }}

      - name: Verify distribution checksums
        run: cd dist && sha256sum --check SHA256SUMS

      - name: Create PyPI publish attestations
        run: |
          uv run --no-project --no-config --with-requirements release-tools.txt -- \
            python -m pypi_attestations sign dist/*.whl dist/*.tar.gz
          test "$(find dist -maxdepth 1 -name '*.publish.attestation' | wc -l)" -eq 2

      - name: Publish to PyPI
        run: >-
          uv publish --trusted-publishing always --no-config
          --check-url https://pypi.org/simple/
          dist/*.whl dist/*.tar.gz

      - name: Upload PyPI-signed distribution
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: pypi-distribution-${{ needs.validate-release.outputs.version }}
          path: dist/
          if-no-files-found: error
          retention-days: 30
          compression-level: 0
          overwrite: true

  create-github-release:
    needs:
      - validate-release
      - build-release
      - attest-release
      - publish-testpypi
      - verify-testpypi
      - publish-pypi
    if: >-
      always() &&
      needs.validate-release.result == 'success' &&
      needs.build-release.result == 'success' &&
      needs.attest-release.result == 'success' &&
      needs.publish-testpypi.result == 'success' &&
      needs.verify-testpypi.result == 'success' &&
      needs.publish-pypi.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Download PyPI release assets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: pypi-distribution-${{ needs.validate-release.outputs.version }}
          path: dist

      - name: Verify release assets
        run: |
          cd dist
          sha256sum --check SHA256SUMS
          test "$(find . -maxdepth 1 -name '*.publish.attestation' | wc -l)" -eq 2

      - name: Create draft GitHub release and publish after asset upload
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_NOTES: ${{ needs.validate-release.outputs.changelog }}
          RELEASE_SHA: ${{ needs.validate-release.outputs.sha }}
          RELEASE_TAG: v${{ needs.validate-release.outputs.version }}
          RELEASE_TITLE: Release ${{ needs.validate-release.outputs.version }}
        run: |
          RELEASE_FLAGS=(
            --draft
            --notes "$RELEASE_NOTES"
            --title "$RELEASE_TITLE"
            --verify-tag
          )
          TAG_OBJECT_SHA="$(gh api \
            "repos/$GITHUB_REPOSITORY/git/ref/tags/$RELEASE_TAG" \
            --jq 'select(.object.type == "tag") | .object.sha')"
          if [[ ! "$TAG_OBJECT_SHA" =~ ^[0-9a-f]{40}$ ]]; then
            echo "Release tag $RELEASE_TAG must be an annotated tag"
            exit 1
          fi
          if ! gh api "repos/$GITHUB_REPOSITORY/git/tags/$TAG_OBJECT_SHA" \
            | jq --exit-status \
              --arg expected_sha "$RELEASE_SHA" \
              '.object.type == "commit" and
               .object.sha == $expected_sha and
               .verification.verified == true' \
            >/dev/null; then
            echo "Release tag $RELEASE_TAG must be verified and target $RELEASE_SHA"
            exit 1
          fi
          RELEASE_STATE="$RUNNER_TEMP/github-release.json"
          if gh release view "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --json isDraft > "$RELEASE_STATE" 2>/dev/null; then
            if [ "$(jq --raw-output '.isDraft' "$RELEASE_STATE")" != "true" ]; then
              echo "Release $RELEASE_TAG is already published"
              exit 1
            fi
          else
            DRAFT_ID="$(gh api repos/$GITHUB_REPOSITORY/releases | jq '.[] | select(.draft == true) | .id' | head -n 1)"
            if [ -n "$DRAFT_ID" ]; then
              gh api -X PATCH repos/$GITHUB_REPOSITORY/releases/$DRAFT_ID \
                -f tag_name="$RELEASE_TAG" \
                -f name="$RELEASE_TITLE" \
                -f body="$RELEASE_NOTES"
            else
              gh release create "$RELEASE_TAG" "${RELEASE_FLAGS[@]}" \
                --repo "$GITHUB_REPOSITORY"
            fi
          fi
          gh release upload "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            dist/*.whl \
            dist/*.tar.gz \
            dist/*.spdx.json \
            dist/*.publish.attestation \
            dist/SHA256SUMS \
            --clobber
          gh release edit "$RELEASE_TAG" --draft=false --repo "$GITHUB_REPOSITORY"
