---
name: CI/CD Tests & Coverage

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          version: "0.11.28"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --locked --all-extras

      - name: Run pre-commit
        run: uv run --no-sync pre-commit run --all-files --show-diff-on-failure

      - name: Type check with mypy
        run: uv run --no-sync python -m mypy micboard

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          version: "0.11.28"

      - name: Set up Python
        run: uv python install 3.13

      - name: Build wheel
        run: |
          uv build --sdist --clear
          uv build --wheel dist/*.tar.gz

      - name: Validate reusable-app contents
        run: uv run --no-project python scripts/validate_wheel.py dist/*.whl

      - name: Smoke-test installed wheel
        run: uv run --no-project --with dist/*.whl python scripts/smoke_test_installed_wheel.py

  test:
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.13"  # renovate: datasource=endoflife-date depName=python
        django-version:
          - "5.1"  # Supported Django compatibility floor
          - "5.2"  # renovate: datasource=endoflife-date depName=django
          - "6.0"  # renovate: datasource=endoflife-date depName=django

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          version: "0.11.28"
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --locked --all-extras

      - name: Run tests with coverage
        run: |
          uv run --no-sync --with "Django~=${{ matrix.django-version }}.0" pytest tests/ \
            --cov=micboard \
            --cov-report=xml \
            --cov-report=html \
            --cov-report=term-missing:skip-covered \
            --cov-fail-under=42 \
            -v
          uv run --no-sync python scripts/check_coverage_inventory.py

      - name: Archive coverage reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: coverage-report-py${{ matrix.python-version }}-dj${{ matrix.django-version }}
          path: |
            coverage.xml
            htmlcov/
          retention-days: 30

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          version: "0.11.28"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Run Bandit security check
        run: |
          uv sync --locked --all-extras
          uv run --no-sync bandit -r micboard -ll

  codeql:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: ['python']

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9  # v4
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          version: "0.11.28"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --locked --all-extras

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9  # v4
        with:
          category: "/language:python"
