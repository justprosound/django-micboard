---
name: CI Quality Gates
run-name: "CI · ${{ github.head_ref || github.ref_name }}"

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: "17 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up uv and Python
        uses: ./.github/actions/setup-uv-python

      - name: Install dependencies
        run: uv sync --locked --all-extras

      - name: Run prek
        run: |
          uv tool install prek
          prek run --all-files --show-diff-on-failure

      - name: Type check with mypy
        run: uv run --no-sync python -m mypy micboard

  package:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
        with:
          persist-credentials: false

      - name: Set up uv and Python
        uses: ./.github/actions/setup-uv-python
        with:
          enable-cache: "false"

      - name: Build wheel
        run: |
          uv build --no-sources --sdist --clear
          uv build --no-sources --wheel dist/*.tar.gz

      - name: Validate reusable-app contents
        run: uv run --no-project python scripts/validate_wheel.py dist/*.whl

      - name: Smoke-test installed wheel
        run: uv run --no-project --with dist/*.whl python scripts/smoke_test_installed_wheel.py

  test:
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.13"  # renovate: datasource=endoflife-date depName=python
        django-version:
          - "5.1"  # Supported Django compatibility floor
          - "5.2"  # renovate: datasource=endoflife-date depName=django
          - "6.0"  # renovate: datasource=endoflife-date depName=django

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
        with:
          persist-credentials: false

      - name: Set up uv and Python
        uses: ./.github/actions/setup-uv-python
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --locked --all-extras

      - name: Run tests with coverage
        run: |
          uv run --no-sync --with "Django~=${{ matrix.django-version }}.0" pytest tests/ \
            --cov=micboard \
            --cov-report=xml \
            --cov-report=html \
            --cov-report=term-missing:skip-covered \
            --cov-fail-under=95 \
            -v
          uv run --no-sync python scripts/check_coverage_inventory.py

      - name: Archive coverage reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: coverage-report-py${{ matrix.python-version }}-dj${{ matrix.django-version }}
          path: |
            coverage.xml
            htmlcov/
          retention-days: 30

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@5975040f7f7d40edaff8d784b576fd65ae95c073  # v5.0.0
        env:
          PYTHON_VERSION: ${{ matrix.python-version }}
          DJANGO_VERSION: ${{ matrix.django-version }}
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
          fail_ci_if_error: true
          env_vars: PYTHON_VERSION,DJANGO_VERSION


  security:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
        with:
          persist-credentials: false

      - name: Set up uv and Python
        uses: ./.github/actions/setup-uv-python

      - name: Audit locked dependencies
        run: uv audit --locked --preview-features audit-command

      - name: Run Bandit security check
        run: |
          uv sync --locked --all-extras
          uv run --no-sync bandit -r micboard -ll

  codeql:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: ['python']

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@7188fc363630916deb702c7fdcf4e481b751f97a  # v4
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          version: "0.11.28"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --locked --all-extras

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@7188fc363630916deb702c7fdcf4e481b751f97a  # v4
        with:
          category: "/language:python"

  required:
    name: CI required
    if: ${{ always() }}
    needs:
      - lint
      - package
      - test
      - security
      - codeql
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions: {}
    steps:
      - name: Verify required jobs
        env:
          REQUIRED_JOB_RESULTS: ${{ toJSON(needs) }}
        run: |
          if jq -e 'all(.[]; .result == "success")' <<<"$REQUIRED_JOB_RESULTS" >/dev/null; then
            echo "All required CI jobs succeeded."
            exit 0
          fi

          jq -r '
            to_entries[]
            | select(.value.result != "success")
            | "::error title=Required CI job did not succeed::\(.key): \(.value.result)"
          ' <<<"$REQUIRED_JOB_RESULTS"
          exit 1
