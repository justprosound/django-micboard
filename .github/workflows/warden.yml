---
name: Warden
run-name: "Warden · PR #${{ github.event.pull_request.number }}"

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]

permissions:
  # Warden uses this scope for GitHub's resolveReviewThread mutation.
  contents: read
  pull-requests: write
  checks: write

jobs:
  review:
    # Fork pull requests do not receive repository secrets. Skipping them also prevents an
    # untrusted head from reaching a write-capable AI review step.
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: Review pull request
        uses: getsentry/warden@8759014a14130cd2b82e59d3fb450a7385721221  # v0.43.0
        env:
          WARDEN_MODEL: ${{ secrets.WARDEN_MODEL }}
          WARDEN_SENTRY_DSN: ${{ secrets.WARDEN_SENTRY_DSN }}
          # Add the WARDEN_<PROVIDER>_API_KEY that matches your WARDEN_MODEL provider:
          WARDEN_OPENAI_API_KEY: ${{ secrets.WARDEN_OPENAI_API_KEY }}
          WARDEN_ANTHROPIC_API_KEY: ${{ secrets.WARDEN_ANTHROPIC_API_KEY }}
          # WARDEN_FIREWORKS_API_KEY: ${{ secrets.WARDEN_FIREWORKS_API_KEY }}
          # WARDEN_OPENROUTER_API_KEY: ${{ secrets.WARDEN_OPENROUTER_API_KEY }}
