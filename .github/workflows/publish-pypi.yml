---
name: Publish to PyPI

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to publish"
        required: true

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/django-micboard
    permissions:
      id-token: write  # Required for trusted publishing

    steps:
    - uses: actions/checkout@v6
      with:
        ref: ${{ inputs.tag }}

    - name: Install uv
      uses: astral-sh/setup-uv@v8.1.0
      with:
        enable-cache: true

    - name: Set up Python
      run: uv python install 3.13

    - name: Install dependencies
      run: uv sync --locked --all-extras

    - name: Verify version matches tag
      env:
        RELEASE_TAG: ${{ inputs.tag }}
      run: |
        uv run --no-sync python -c \
          'import os; from packaging.version import Version; import micboard; tag = Version(os.environ["RELEASE_TAG"].removeprefix("v")); package = Version(micboard.__version__); assert tag == package, f"tag {tag} != package {package}"'

    - name: Build package
      run: |
        uv build --sdist --clear
        uv build --wheel dist/*.tar.gz

    - name: Check package
      run: uvx --from twine twine check dist/*

    - name: Publish to PyPI using trusted publishing
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        print-hash: true
