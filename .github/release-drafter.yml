name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'
categories:
  - title: '🚀 Features'
    when:
      labels:
        - 'feature'
        - 'enhancement'
  - title: '🐛 Bug Fixes'
    when:
      labels:
        - 'fix'
        - 'bug'
        - 'bugfix'
  - title: '📚 Documentation'
    when:
      labels:
        - 'documentation'
        - 'docs'
  - title: '🧰 Maintenance'
    when:
      labels:
        - 'chore'
        - 'maintenance'
        - 'dependencies'
change-template: '- $TITLE @$AUTHOR (#$NUMBER)'
change-title-escapes: '\<*_&'
template: |
  ## What's Changed

  $CHANGES
