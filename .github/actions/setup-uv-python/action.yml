---
name: Set up uv and Python
description: Install the repository-pinned uv release and provision one Python runtime.

inputs:
  python-version:
    description: Python version understood by uv.
    required: false
    default: "3.13"
  enable-cache:
    description: Whether setup-uv should restore and save its dependency cache.
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - name: Install uv
      uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9  # v9.0.0
      with:
        version: "0.11.30"
        enable-cache: ${{ inputs.enable-cache }}

    - name: Set up Python
      shell: bash
      env:
        PYTHON_VERSION: ${{ inputs.python-version }}
      run: |
        command -v uv >/dev/null 2>&1 || {
          echo "error: uv is required" >&2
          exit 1
        }
        uv --version >/dev/null
        uv python install "$PYTHON_VERSION"
