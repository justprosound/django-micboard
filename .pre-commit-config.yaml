---
# All hooks use the uv-managed project environment. Generated migration files
# are excluded per hook so the integrity check below can inspect them.
exclude: '(^|/)(docs|node_modules|\.venv|build|dist)/|^\.coverage$'

repos:
  - repo: local
    hooks:
      - id: trailing-whitespace
        name: trailing whitespace
        entry: uv run --no-sync trailing-whitespace-fixer
        language: system
        types: [text]
        exclude: '(^|/)migrations/'

      - id: end-of-file-fixer
        name: end of file fixer
        entry: uv run --no-sync end-of-file-fixer
        language: system
        types: [text]
        exclude: '(^|/)migrations/'

      - id: check-yaml
        name: check yaml
        entry: uv run --no-sync check-yaml
        language: system
        types: [yaml]
        exclude: '(^|/)migrations/'

      - id: check-json
        name: check json
        entry: uv run --no-sync check-json
        language: system
        types: [json]
        exclude: '(^|/)migrations/'

      - id: check-toml
        name: check toml
        entry: uv run --no-sync check-toml
        language: system
        types: [toml]
        exclude: '(^|/)migrations/'

      - id: check-merge-conflict
        name: check merge conflicts
        entry: uv run --no-sync check-merge-conflict
        language: system
        types: [text]
        exclude: '(^|/)migrations/'

      - id: debug-statements
        name: debug statements
        entry: uv run --no-sync debug-statement-hook
        language: system
        types: [python]
        exclude: '(^|/)migrations/'

      - id: ruff-check
        name: ruff check
        entry: uv run --no-sync ruff check --fix --exit-non-zero-on-fix
        language: system
        types_or: [python, pyi]
        exclude: '(^|/)migrations/'

      - id: ruff-format
        name: ruff format
        entry: uv run --no-sync ruff format --check
        language: system
        types_or: [python, pyi]
        exclude: '(^|/)migrations/'

      - id: mypy
        name: mypy
        entry: uv run --no-sync python -m mypy micboard
        language: system
        pass_filenames: false
        types_or: [python, pyi]

      - id: django-migrations-check
        name: django migration drift check
        entry: >-
          uv run --no-sync python -m django makemigrations micboard micboard_multitenancy
          --check --dry-run --settings=tests.settings
        language: system
        pass_filenames: false
        always_run: true

      - id: django-migration-integrity
        name: django generated migration integrity
        entry: uv run --no-sync python scripts/check_migration_integrity.py
        language: system
        pass_filenames: false
        always_run: true

      - id: docs-requirements-lock
        name: docs requirements lock consistency
        entry: uv run --no-sync python scripts/check_docs_requirements.py
        language: system
        pass_filenames: false
        always_run: true

ci:
  autoupdate_schedule: weekly
  skip: []
  submodules: true
