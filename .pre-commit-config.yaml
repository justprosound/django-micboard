---
# Standardized pre-commit configuration for ClassWeb super-project
# This configuration is designed to be shared across all modules

exclude: '^docs/|/migrations/|/node_modules/|.venv|/build/|/dist/|.coverage'

default_language_version:
    python: python3.13

repos:
    # Basic file hygiene hooks
    - repo: https://github.com/pre-commit/pre-commit-hooks
      rev: v6.0.0
      hooks:
          - id: trailing-whitespace
          - id: end-of-file-fixer
          - id: check-yaml
          - id: check-json
          - id: check-toml
          - id: check-added-large-files
            args: ['--maxkb=1000']
          - id: check-case-conflict
          - id: check-merge-conflict
          - id: debug-statements
          - id: mixed-line-ending
            args: [--fix=lf]
          - id: check-symlinks
          - id: check-vcs-permalinks

    # Python code quality and formatting
    - repo: https://github.com/astral-sh/ruff-pre-commit
      rev: v0.15.1
      hooks:
          - id: ruff-check
            args: ['--fix', '--exit-non-zero-on-fix']
            exclude: /migrations/
          - id: ruff-format
            exclude: /migrations/

    # Django-specific hooks
    - repo: https://github.com/adamchainz/django-upgrade
      rev: 1.29.1
      hooks:
          - id: django-upgrade
            args: [--target-version, '5.1']
            exclude: /migrations/

    # GitHub Actions/workflows validation
    - repo: https://github.com/python-jsonschema/check-jsonschema
      rev: 0.36.1
      hooks:
          - id: check-github-workflows
            args: [--verbose]
          - id: check-github-actions
            args: [--verbose]
          - id: check-renovate
            args: [--verbose]
            additional_dependencies: [pyjson5]

    # Commit message linting
    - repo: https://github.com/alessandrojcm/commitlint-pre-commit-hook
      rev: v9.24.0
      hooks:
          - id: commitlint
            stages: [commit-msg]
            additional_dependencies: ['@commitlint/config-conventional']

    # Docker-compose validation
    - repo: https://github.com/iamthefij/docker-pre-commit
      rev: v3.0.1
      hooks:
          - id: docker-compose-check
            files: ^compose-[a-zA-Z0-9]*\.ya?ml$

    # Django safemigrations (prevent dangerous migrations)
    - repo: https://github.com/ryanhiebert/django-safemigrate
      rev: "6.0"
      hooks:
          - id: check
            name: django-safemigration
            entry: django-safemigrate
            language: system
            files: migrations/.*\.py$
            exclude: migrations/__init__\.py$

# CI configuration for autoupdates
ci:
    autoupdate_schedule: weekly
    skip: []
    submodules: true
