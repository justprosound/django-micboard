      - Product Requirements:
          - PRD 001 - Service Architecture: prd/001-service-architecture-refinement.md
          - PRD 002 - Admin Modernization: prd/002-admin-modernization.md
          - PRD 003 - Plugin Infrastructure: prd/003-plugin-standardization-infrastructure.md
          - PRD 004 - Quality and API Documentation: prd/004-quality-api-documentation.md
          - PRD Requirements: prd/requirements.md
      - SRED 2026:
          - Index: sred/2026/INDEX.md
          - README: sred/2026/README.md
          - Service Layer Decomposition: sred/2026/project-01-service-layer-decomposition.md
          - Extract Model Logic: sred/2026/project-02-extract-model-logic.md
          - Admin Modularization: sred/2026/project-03-admin-modularization.md
          - Standardize Plugins: sred/2026/project-04-standardize-plugins.md
