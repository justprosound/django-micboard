  - About:
      - Changelog: changelog.md
      - Breaking Changes v26.01: changelog/breaking-changes-v26.01.md

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [micboard]
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_root_toc_entry: false
            merge_init_into_class: true
            docstring_section_style: list
            annotations_path: brief
            annotations: true
            inheritance: true
            summary: true
  - git-revision-date-localized:
      enable_creation_date: true
      type: datetime
      locale: en
      timezone: UTC
  - minify:
      minify_html: true
      minify_css: true
      minify_js: true
  # - sitemap:
  #     changefreq: weekly
  #     priority: 0.8

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
      toc_depth: 3
  - codehilite:
      guess_lang: false
  - fenced_code
  - tables
  - meta
  - pymdownx.arithmatex
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

extra:
  version:
    provider: mike
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/justprosound/django-micboard
  generator: false

extra_css:
  - stylesheets/extra.css

