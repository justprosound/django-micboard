---
site_name: django-micboard
site_description: Django app for real-time Shure wireless microphone monitoring
site_url: https://django-micboard.readthedocs.io
repo_url: https://github.com/justprosound/django-micboard
repo_name: django-micboard
copyright: Licensed under AGPL-3.0-or-later | Community-driven open source project

theme:
  name: material
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tooltips
    - toc.follow
    - toc.integrate
    - header.autohide
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Roboto
    code: Roboto Mono
  icon:
    logo: material/database
    repo: fontawesome/brands/github

nav:
