---
site_name: django-micboard
site_description: Django app for real-time Shure wireless microphone monitoring
site_url: https://django-micboard.readthedocs.io
repo_url: https://github.com/justprosound/django-micboard
repo_name: django-micboard
copyright: Licensed under AGPL-3.0-or-later | Community-driven open source project

theme:
  name: mkdocs
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tooltips
    - toc.follow
    - toc.integrate
  font:
    text: Roboto
    code: Roboto Mono

nav:
  - Home: index.md
  - Getting Started:
      - Quick Start: quickstart.md
      - Installation: installation.md
      - Configuration: configuration.md
  - User Guide:
      - Monitoring Devices: guides/monitoring.md
      - Admin Interface: guides/admin-interface.md
      - Real-time Updates: guides/realtime-updates.md
      - Multitenancy: multitenancy.md
      - Multitenancy Quickref: multitenancy-quickref.md
      - API Band-plan Detection: guides/api-band-plan-detection.md
      - Band-plan Auto-population: guides/band-plan-auto-population.md
      - Regulatory Coverage: guides/regulatory-coverage-monitoring.md
  - Shure Integration:
      - Shure System API: shure-integration.md
      - Device Discovery: integration/discovery-workflow.md
      - Troubleshooting: guides/shure-troubleshooting.md
      - API References: integration/integration-references.md
  - API Reference:
      - REST API: api/endpoints.md
      - WebSocket API: api/websocket.md
      - Management Commands: api/management.md
      - Models: api/models.md
      - Serializers: api/serializers.md
      - Views: api/views.md
  - Development:
      - Developer Guide: development.md
      - Architecture: development/architecture.md
      - Python API: development/api-reference.md
      - Dependencies: development/dependency-management.md
      - Agent Guidance:
          - Domain Context: agents/domain.md
          - Issue Tracker: agents/issue-tracker.md
          - Triage Labels: agents/triage-labels.md
      - Architecture Decisions:
          - ADR 001 - Service Layer Decomposition: adr/001-service-layer-decomposition.md
          - ADR 002 - Extract Model Business Logic: adr/002-extract-model-business-logic.md
          - ADR 003 - Admin Dashboard Modularization: adr/003-admin-dashboard-modularization.md
          - ADR 004 - Standardize Manufacturer Plugins: adr/004-standardize-manufacturer-plugins.md
          - ADR 005 - Unify Settings Proxy: adr/005-unify-settings-proxy.md
          - ADR 006 - Test Infrastructure Overhaul: adr/006-test-infrastructure-overhaul.md
          - ADR 007 - API Layer Introduction: adr/007-api-layer-introduction.md
          - ADR 008 - Remove Compatibility Shim: adr/008-remove-compat-shim.md
          - ADR 009 - Consolidate Exception Hierarchy: adr/009-consolidate-exception-hierarchy.md
          - ADR 010 - Split Base HTTP Client: adr/010-split-base-http-client.md
          - ADR 011 - Introduce Event Bus: adr/011-introduce-eventbus.md
      - Product Requirements:
          - PRD 001 - Service Architecture: prd/001-service-architecture-refinement.md
          - PRD 002 - Admin Modernization: prd/002-admin-modernization.md
          - PRD 003 - Plugin Infrastructure: prd/003-plugin-standardization-infrastructure.md
          - PRD 004 - Quality and API Documentation: prd/004-quality-api-documentation.md
  - About:
      - Changelog: changelog.md

plugins:
  - search

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
      toc_depth: 3
  - codehilite:
      guess_lang: false
  - fenced_code
  - tables
  - meta

extra:
  version:
    provider: mike
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/justprosound/django-micboard
  generator: false

extra_css:
  - stylesheets/extra.css

# Analytics (optional - add when ready)
# extra:
#   analytics:
#     provider: google
#     property: G-XXXXXXXXXX
